<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f1020" />
<title>One-Line Runner</title>
<meta property="og:title" content="One-Line Runner" />
<meta property="og:description" content="A one-button daily arcade. Same map for everyone — what's your score today?" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #0f1020; touch-action: manipulation;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    user-select: none; -webkit-user-select: none;
  }
  #wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; }
  canvas#game { display: block; background: #0f1020; touch-action: none; }
  .overlay {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    color: #fff; pointer-events: none; padding: 24px;
  }
  .overlay.hidden { display: none; }
  .title { font-size: clamp(30px, 8.5vw, 62px); font-weight: 800; letter-spacing: -1px; }
  .title .accent { color: #4fd1c5; }
  .sub { margin-top: 10px; font-size: clamp(14px, 4vw, 18px); opacity: .7; }
  .big-score { font-size: clamp(56px, 16vw, 120px); font-weight: 800; line-height: 1; }
  .best { margin-top: 8px; font-size: clamp(14px, 4vw, 20px); color: #4fd1c5; font-weight: 600; }
  .daytag { margin-top: 4px; font-size: clamp(13px, 3.6vw, 16px); opacity: .6; letter-spacing: 1px; }
  .emojibar { margin-top: 14px; font-size: clamp(20px, 6vw, 30px); letter-spacing: 2px; }
  .hint {
    margin-top: 26px; font-size: clamp(14px, 4vw, 18px); opacity: .85;
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: .35; } 50% { opacity: .95; } }
  .btnrow { display: flex; gap: 12px; margin-top: 26px; flex-wrap: wrap; justify-content: center; }
  .btn {
    pointer-events: auto; padding: 14px 24px; border-radius: 999px;
    border: 1.5px solid rgba(255,255,255,.22); background: rgba(255,255,255,.06);
    color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; backdrop-filter: blur(6px);
    transition: transform .1s, background .15s, border-color .15s;
  }
  .btn:active { transform: scale(.94); }
  .btn.primary { background: #4fd1c5; color: #0f1020; border-color: #4fd1c5; }
  .btn.primary:active { background: #3bb8ad; }
  .btn.ghost:active { background: rgba(255,255,255,.14); }
  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #4fd1c5; color: #0f1020; padding: 10px 20px; border-radius: 999px;
    font-weight: 700; font-size: 14px; opacity: 0; transition: opacity .25s, transform .25s;
    pointer-events: none; z-index: 20;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #hud {
    position: fixed; top: 0; left: 0; right: 0; display: flex; justify-content: space-between;
    padding: 18px 22px; color: #fff; font-weight: 700; font-size: clamp(18px, 5vw, 26px);
    pointer-events: none;
  }
  #hud .lbl { opacity: .5; font-size: 12px; font-weight: 600; letter-spacing: 1px; display:block; }
  #hud .r { text-align: right; color: #4fd1c5; }
  #hud .mid { text-align: center; opacity: .6; font-size: 13px; align-self: center; letter-spacing: 1px; }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>

<div id="hud" class="hidden">
  <div><span class="lbl">SCORE</span><span id="hudScore">0</span></div>
  <div class="mid" id="hudMode">DAILY</div>
  <div class="r"><span class="lbl">BEST</span><span id="hudBest">0</span></div>
</div>

<!-- Start screen -->
<div id="startScreen" class="overlay">
  <div class="title">One-Line <span class="accent">Runner</span></div>
  <div class="sub" id="startSub">Same map for everyone, every day.</div>
  <div class="daytag" id="startDay">DAILY #1</div>
  <div class="btnrow">
    <button class="btn primary" id="btnDaily">🌍 Daily Challenge</button>
    <button class="btn ghost" id="btnEndless">♾️ Endless</button>
  </div>
  <div class="sub" style="margin-top:22px; opacity:.45; font-size:13px">Tap / Click / Space to jump</div>
</div>

<!-- Game over screen -->
<div id="overScreen" class="overlay hidden">
  <div class="sub" style="opacity:.6" id="overLabel">GAME OVER</div>
  <div class="big-score" id="finalScore">0</div>
  <div class="best" id="bestLine">BEST 0</div>
  <div class="emojibar" id="emojiBar"></div>
  <div class="btnrow">
    <button class="btn primary" id="shareBtn">📤 Share</button>
    <button class="btn ghost" id="retryBtn">↻ Retry</button>
    <button class="btn ghost" id="menuBtn">☰ Menu</button>
  </div>
</div>

<div id="toast" class="toast">Copied!</div>

<script>
(() => {
  const GAME_URL = 'https://201horseny.github.io/one-line-runner/';

  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');
  const hudScore = document.getElementById('hudScore');
  const hudBest = document.getElementById('hudBest');
  const hudMode = document.getElementById('hudMode');
  const startScreen = document.getElementById('startScreen');
  const startDay = document.getElementById('startDay');
  const overScreen = document.getElementById('overScreen');
  const overLabel = document.getElementById('overLabel');
  const finalScore = document.getElementById('finalScore');
  const bestLine = document.getElementById('bestLine');
  const emojiBar = document.getElementById('emojiBar');
  const shareBtn = document.getElementById('shareBtn');
  const retryBtn = document.getElementById('retryBtn');
  const menuBtn = document.getElementById('menuBtn');
  const btnDaily = document.getElementById('btnDaily');
  const btnEndless = document.getElementById('btnEndless');
  const toast = document.getElementById('toast');

  // ---- Seeded RNG (mulberry32) for the daily map ----
  function mulberry32(a) {
    return function () {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const EPOCH = Date.UTC(2026, 0, 1); // Jan 1 2026 UTC = Day #1
  function dayNumber() {
    const n = new Date();
    const today = Date.UTC(n.getUTCFullYear(), n.getUTCMonth(), n.getUTCDate());
    return Math.floor((today - EPOCH) / 86400000) + 1;
  }
  function daySeed() {
    const n = new Date();
    return n.getUTCFullYear() * 10000 + (n.getUTCMonth() + 1) * 100 + n.getUTCDate();
  }
  const DAY_NUM = dayNumber();
  startDay.textContent = 'DAILY #' + DAY_NUM;

  // rng() is swapped per mode. Daily => seeded & reproducible for everyone.
  let seededRng = mulberry32(daySeed());
  let rng = Math.random;

  // ---- Responsive canvas ----
  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    groundY = H * 0.78;
  }
  window.addEventListener('resize', resize);

  // ---- Game state ----
  const STATE = { MENU: 0, PLAY: 1, OVER: 2 };
  let state = STATE.MENU;
  let mode = 'daily';
  let groundY = 0;

  function bestKey() { return mode === 'daily' ? 'olr_daily_' + DAY_NUM : 'olr_endless_best'; }
  function getBest() { return parseInt(localStorage.getItem(bestKey()) || '0', 10); }

  const player = { x: 0, y: 0, r: 16, vy: 0, onGround: true, rot: 0 };
  const GRAVITY = 2400, JUMP_V = -780;
  let coyote = 0;

  let speed = 340, baseSpeed = 340;
  let dist = 0, score = 0;
  let obstacles = [], particles = [], stars = [];
  let spawnGapPx = 320, sinceSpawn = 0, shake = 0;

  function reset() {
    // seeded map for daily; fresh random for endless
    if (mode === 'daily') { seededRng = mulberry32(daySeed()); rng = seededRng; }
    else { rng = Math.random; }

    speed = baseSpeed = 340;
    dist = 0; score = 0;
    obstacles = []; particles = [];
    spawnGapPx = 320; sinceSpawn = 0;
    player.x = W * 0.24; player.y = groundY - player.r;
    player.vy = 0; player.onGround = true; player.rot = 0;
    shake = 0;
    stars = [];
    for (let i = 0; i < 60; i++) {
      stars.push({ x: Math.random() * W, y: Math.random() * groundY, z: 0.2 + Math.random() * 0.8, s: Math.random() * 1.6 + 0.4 });
    }
    hudMode.textContent = mode === 'daily' ? ('DAILY #' + DAY_NUM) : 'ENDLESS';
    hudBest.textContent = getBest();
    hudScore.textContent = '0';
  }

  function jump() {
    if (player.onGround || coyote > 0) {
      player.vy = JUMP_V; player.onGround = false; coyote = 0;
      spawnParticles(player.x, groundY, 8, '#4fd1c5');
    }
  }

  function spawnObstacle() {
    const diff = Math.min(dist / 6000, 1);
    const h = 26 + rng() * (34 + diff * 46);
    const w = 20 + rng() * 26;
    obstacles.push({ x: W + 40, w, h, scored: false });
    const minGap = 300 - diff * 90;
    spawnGapPx = minGap + rng() * (240 - diff * 120);
  }

  function spawnParticles(x, y, n, color) {
    for (let i = 0; i < n; i++) {
      particles.push({
        x, y, vx: (Math.random() - 0.5) * 260, vy: -Math.random() * 320,
        life: 0.5 + Math.random() * 0.4, max: 0.9, color, r: 2 + Math.random() * 3
      });
    }
  }

  // ---- Emoji result bar (Wordle-style flair) ----
  function emojiFor(s) {
    const cells = 10;
    const filled = Math.max(0, Math.min(cells, Math.floor(s / 15)));
    let out = '';
    for (let i = 0; i < cells; i++) out += i < filled ? '🟩' : '⬛';
    return out;
  }

  function gameOver() {
    state = STATE.OVER;
    shake = 16;
    spawnParticles(player.x, player.y, 26, '#ff5a76');
    const s = Math.floor(score);
    const prevBest = getBest();
    const newBest = s > prevBest;
    if (newBest) localStorage.setItem(bestKey(), String(s));
    const shownBest = Math.max(s, prevBest);

    overLabel.textContent = mode === 'daily' ? ('DAILY #' + DAY_NUM) : 'GAME OVER';
    finalScore.textContent = s;
    bestLine.textContent = (newBest ? '🎉 NEW BEST ' : 'BEST ') + shownBest;
    emojiBar.textContent = emojiFor(s);
    hudBest.textContent = shownBest;

    setTimeout(() => {
      if (state === STATE.OVER) {
        overScreen.classList.remove('hidden');
        hud.classList.add('hidden');
      }
    }, 450);
  }

  // ---- Share card (generated PNG) ----
  function buildShareText() {
    const s = Math.floor(score);
    const head = mode === 'daily'
      ? `One-Line Runner · Daily #${DAY_NUM}`
      : `One-Line Runner · Endless`;
    return `${head}\nScore: ${s} 🏃‍♂️\n${emojiFor(s)}\nCan you beat me? ${GAME_URL}`;
  }

  function makeShareCanvas() {
    const c = document.createElement('canvas');
    const w = 1080, h = 1080;
    c.width = w; c.height = h;
    const g = c.getContext('2d');
    // bg
    const grad = g.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#181b3a'); grad.addColorStop(1, '#0a0a16');
    g.fillStyle = grad; g.fillRect(0, 0, w, h);
    // neon ground line
    g.strokeStyle = '#4fd1c5'; g.lineWidth = 8;
    g.shadowColor = '#4fd1c5'; g.shadowBlur = 40;
    g.beginPath(); g.moveTo(90, 300); g.lineTo(w - 90, 300); g.stroke();
    g.shadowBlur = 0;
    const cx = w / 2;
    g.textAlign = 'center';
    // title
    g.fillStyle = '#ffffff'; g.font = '800 76px -apple-system, Segoe UI, Roboto, sans-serif';
    g.fillText('ONE-LINE RUNNER', cx, 200);
    // mode tag
    g.fillStyle = '#4fd1c5'; g.font = '700 44px -apple-system, Segoe UI, Roboto, sans-serif';
    g.fillText(mode === 'daily' ? `DAILY #${DAY_NUM}` : 'ENDLESS', cx, 430);
    // score
    g.fillStyle = '#ffffff'; g.font = '800 300px -apple-system, Segoe UI, Roboto, sans-serif';
    g.fillText(String(Math.floor(score)), cx, 720);
    g.fillStyle = 'rgba(255,255,255,.55)'; g.font = '600 40px -apple-system, Segoe UI, Roboto, sans-serif';
    g.fillText('SCORE', cx, 790);
    // emoji bar (drawn as squares)
    const s = Math.floor(score);
    const filled = Math.max(0, Math.min(10, Math.floor(s / 15)));
    const bw = 70, gap = 12, total = 10 * bw + 9 * gap;
    let bx = cx - total / 2;
    for (let i = 0; i < 10; i++) {
      g.fillStyle = i < filled ? '#4fd1c5' : 'rgba(255,255,255,.12)';
      g.fillRect(bx, 860, bw, 70);
      bx += bw + gap;
    }
    // footer
    g.fillStyle = 'rgba(255,255,255,.5)'; g.font = '600 34px -apple-system, Segoe UI, Roboto, sans-serif';
    g.fillText('Can you beat me?  ·  201horseny.github.io/one-line-runner', cx, 1010);
    return c;
  }

  async function share() {
    const text = buildShareText();
    const c = makeShareCanvas();
    // Try native share with image (best on mobile)
    try {
      const blob = await new Promise(res => c.toBlob(res, 'image/png'));
      if (blob) {
        const file = new File([blob], 'one-line-runner.png', { type: 'image/png' });
        if (navigator.canShare && navigator.canShare({ files: [file] })) {
          await navigator.share({ files: [file], text, title: 'One-Line Runner' });
          return;
        }
        if (navigator.share) { await navigator.share({ text, url: GAME_URL, title: 'One-Line Runner' }); return; }
        // Desktop fallback: download the image + copy the text
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'one-line-runner.png';
        a.click();
        URL.revokeObjectURL(a.href);
      }
    } catch (err) { /* user cancelled or unsupported */ }
    // Always also copy text so there's something to paste
    try { await navigator.clipboard.writeText(text); showToast('Copied result!'); }
    catch (e) { showToast('Ready to share'); }
  }

  function showToast(msg) {
    toast.textContent = msg || 'Copied!';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  }

  // ---- Flow control ----
  function startGame(m) {
    mode = m;
    startScreen.classList.add('hidden');
    overScreen.classList.add('hidden');
    hud.classList.remove('hidden');
    reset();
    state = STATE.PLAY;
  }
  function toMenu() {
    state = STATE.MENU;
    overScreen.classList.add('hidden');
    hud.classList.add('hidden');
    startScreen.classList.remove('hidden');
  }

  // ---- Input ----
  btnDaily.addEventListener('click', (e) => { e.stopPropagation(); startGame('daily'); });
  btnEndless.addEventListener('click', (e) => { e.stopPropagation(); startGame('endless'); });
  retryBtn.addEventListener('click', (e) => { e.stopPropagation(); startGame(mode); });
  menuBtn.addEventListener('click', (e) => { e.stopPropagation(); toMenu(); });
  shareBtn.addEventListener('click', (e) => { e.stopPropagation(); share(); });

  function press(e) {
    if (state === STATE.PLAY) {
      if (e && e.type === 'touchstart') e.preventDefault();
      jump();
    }
    // MENU / OVER handled by their buttons
  }
  window.addEventListener('mousedown', press);
  window.addEventListener('touchstart', press, { passive: false });
  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      if (state === STATE.PLAY) jump();
      else if (state === STATE.MENU) startGame('daily');
      else if (state === STATE.OVER && !overScreen.classList.contains('hidden')) startGame(mode);
    }
  });

  // ---- Loop ----
  let last = performance.now();
  function frame(now) {
    let dt = (now - last) / 1000; last = now;
    if (dt > 0.05) dt = 0.05;
    if (state === STATE.PLAY) update(dt);
    render();
    requestAnimationFrame(frame);
  }

  function update(dt) {
    dist += speed * dt;
    score += speed * dt * 0.02;
    hudScore.textContent = Math.floor(score);
    baseSpeed = 340 + Math.min(dist / 20, 340);
    speed = baseSpeed;

    player.vy += GRAVITY * dt;
    player.y += player.vy * dt;
    if (player.onGround) coyote = Math.max(0, coyote - dt);
    player.rot += (player.onGround ? 0 : dt * 8);

    const floor = groundY - player.r;
    if (player.y >= floor) {
      player.y = floor;
      if (!player.onGround) { player.onGround = true; coyote = 0.09; player.rot = 0; }
      player.vy = 0;
    } else { player.onGround = false; }

    sinceSpawn += speed * dt;
    if (sinceSpawn >= spawnGapPx) { sinceSpawn = 0; spawnObstacle(); }

    for (const o of obstacles) {
      o.x -= speed * dt;
      if (!o.scored && o.x + o.w < player.x - player.r) {
        o.scored = true; score += 5; spawnParticles(player.x, player.y, 4, '#ffd166');
      }
      const px = player.x, py = player.y, pr = player.r * 0.82;
      const nx = Math.max(o.x, Math.min(px, o.x + o.w));
      const ny = Math.max(groundY - o.h, Math.min(py, groundY));
      const dx = px - nx, dy = py - ny;
      if (dx * dx + dy * dy < pr * pr) { gameOver(); }
    }
    obstacles = obstacles.filter(o => o.x + o.w > -20);

    for (const p of particles) {
      p.vy += 900 * dt; p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
    }
    particles = particles.filter(p => p.life > 0);

    for (const st of stars) {
      st.x -= speed * st.z * 0.25 * dt;
      if (st.x < -2) { st.x = W + 2; st.y = Math.random() * groundY; }
    }
    if (shake > 0) shake = Math.max(0, shake - dt * 60);
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    let sx = 0, sy = 0;
    if (shake > 0) { sx = (Math.random() - 0.5) * shake; sy = (Math.random() - 0.5) * shake; }
    ctx.save(); ctx.translate(sx, sy);

    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#141633'); g.addColorStop(0.7, '#0f1020'); g.addColorStop(1, '#0a0a16');
    ctx.fillStyle = g; ctx.fillRect(-20, -20, W + 40, H + 40);

    for (const st of stars) {
      ctx.globalAlpha = 0.3 + st.z * 0.5;
      ctx.fillStyle = '#8892d6';
      ctx.fillRect(st.x, st.y, st.s, st.s);
    }
    ctx.globalAlpha = 1;

    ctx.strokeStyle = '#4fd1c5'; ctx.lineWidth = 3;
    ctx.shadowColor = '#4fd1c5'; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();
    ctx.shadowBlur = 0;

    for (const o of obstacles) {
      ctx.fillStyle = '#ff5a76'; ctx.shadowColor = '#ff5a76'; ctx.shadowBlur = 12;
      roundRect(o.x, groundY - o.h, o.w, o.h, 4); ctx.fill();
    }
    ctx.shadowBlur = 0;

    if (state !== STATE.MENU) {
      ctx.save(); ctx.translate(player.x, player.y); ctx.rotate(player.rot);
      ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = 16;
      const s = player.r; roundRect(-s, -s, s * 2, s * 2, 5); ctx.fill();
      ctx.restore(); ctx.shadowBlur = 0;
    }

    for (const p of particles) {
      ctx.globalAlpha = Math.max(0, p.life / p.max);
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  resize();
  reset();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
