<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f1020" />
<title>미니마니모 · minimanimo</title>
<meta name="description" content="한 손으로 즐기는 초간단 미니게임 모음. 다그닥다그닥, 빙빙 — 지금 바로 플레이!" />
<meta property="og:title" content="미니마니모 · minimanimo" />
<meta property="og:description" content="한 손으로 즐기는 초간단 미니게임 모음. 지금 바로 플레이!" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    min-height: 100%;
    background: #0f1020; color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", sans-serif;
    -webkit-user-select: none; user-select: none;
  }
  body {
    background: radial-gradient(1200px 600px at 50% -10%, #1a1c3a 0%, #0f1020 60%);
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 20px 40px; min-height: 100vh;
  }
  .logo {
    font-size: clamp(38px, 11vw, 72px); font-weight: 800; letter-spacing: -2px;
    line-height: 1; text-align: center;
  }
  .logo .accent { color: #4fd1c5; }
  .logo-en { margin-top: 8px; font-size: clamp(12px, 3.4vw, 15px); letter-spacing: 6px;
    text-transform: uppercase; opacity: .45; text-align: center; }
  .tagline { margin-top: 18px; font-size: clamp(14px, 4vw, 17px); opacity: .7;
    text-align: center; max-width: 340px; line-height: 1.6; }

  .grid { margin-top: 40px; width: 100%; max-width: 440px;
    display: flex; flex-direction: column; gap: 16px; }
  .card {
    display: flex; align-items: center; gap: 18px; text-decoration: none; color: #fff;
    padding: 20px 22px; border-radius: 22px;
    border: 1.5px solid rgba(255,255,255,.10); background: rgba(255,255,255,.045);
    transition: transform .12s ease, border-color .15s, background .15s;
  }
  .card:active { transform: scale(.97); }
  .card:hover { border-color: rgba(79,209,197,.5); background: rgba(79,209,197,.06); }
  .emoji { font-size: 40px; width: 56px; height: 56px; flex: 0 0 56px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,.06); border-radius: 16px; }
  .info { flex: 1; min-width: 0; }
  .name { font-size: clamp(19px, 5.4vw, 23px); font-weight: 800; }
  .desc { margin-top: 3px; font-size: clamp(12px, 3.6vw, 14px); opacity: .6; line-height: 1.45; }
  .arrow { font-size: 22px; opacity: .35; flex: 0 0 auto; }

  .footer { margin-top: auto; padding-top: 40px; text-align: center;
    font-size: 12px; opacity: .4; line-height: 2; }
  .footer a { color: inherit; }
</style>
</head>
<body>
  <div class="logo">미니<span class="accent">마니</span>모</div>
  <div class="logo-en">minimanimo</div>
  <div class="tagline">한 손으로 즐기는 초간단 미니게임 모음.<br>탭 한 번이면 시작!</div>

  <div class="grid">
    <a class="card" href="/dagdak-dagdak">
      <div class="emoji">🐎</div>
      <div class="info">
        <div class="name">다그닥다그닥</div>
        <div class="desc">달리는 말이 되어 장애물을 뛰어넘어라. 100m마다 빨라짐!</div>
      </div>
      <div class="arrow">›</div>
    </a>

    <a class="card" href="/bing-bing">
      <div class="emoji">🎯</div>
      <div class="info">
        <div class="name">빙빙</div>
        <div class="desc">빙빙 도는 바늘이 초록 구간에 올 때 탭! 콤보를 쌓아라.</div>
      </div>
      <div class="arrow">›</div>
    </a>
  </div>

  <div class="footer">
    © 2026 minimanimo · <a href="/privacy">개인정보처리방침</a>
  </div>
</body>
</html>
